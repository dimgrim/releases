<!DOCTYPE html>
<html lang="en">
<head>
    <title>Neon Audio Plugins</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 20px;
        }
        .plugins {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }
        .plugin {
            background-color: #333;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            transition: transform 0.2s;
        }
        .plugin:hover {
            transform: scale(1.05);
        }
        .plugin-image {
            max-width: 20%;
            height: auto;
            border-radius: 5px;
        }
        .download-button {
            display: inline-block;
            background-color: #ff5c5c;
            color: #fff;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 10px;
            transition: background-color 0.3s;
        }
        .download-button:hover {
            background-color: #ff2c2c;
        }
    </style>
</head>
<body>
    <header>
        <h1>Neon Audio Plugins</h1>
    </header>
    <main>
        <section class="plugins">
            <article class="plugin">
                <img src="stereo delay.png" alt="Neon Audio Stereo Delay" class="plugin-image">
                <h2>Neon Audio Stereo Delay</h2>
                <a href="Stereo Delay.exe" class="download-button">Download EXE</a>
                <a href="Stereo Delay.vst3" class="download-button">Download VST3</a>
            </article>
            <article class="plugin">
                <img src="subsynth.jpg" alt="Neon Audio Subsynth" class="plugin-image">
                <h2>Neon Audio Subsynth</h2>
                <a href="Subsynth.exe" class="download-button">Download EXE</a>
                <a href="Subsynth.vst3" class="download-button">Download VST3</a>
            </article>
            <article class="plugin">
                <img src="eq.jpg" alt="Neon Audio EQ" class="plugin-image">
                <h2>Neon Audio EQ</h2>
                <a href="EQ.exe" class="download-button">Download EXE</a>
                <a href="EQ.vst3" class="download-button">Download VST3</a>
            </article>
            <article class="plugin">
                <img src="compressor.jpg" alt="Neon Audio Compressor" class="plugin-image">
                <h2>Neon Audio Compressor</h2>
                <a href="Neon Audio Compressor.exe" class="download-button">Download EXE</a>
                <a href="Neon Audio Compressor.vst3" class="download-button">Download VST3</a>
            </article>
        </section>
    </main>
</body>
</html>
